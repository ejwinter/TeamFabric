<div class="app-shell">

  <!-- Top toolbar -->
  <mat-toolbar class="toolbar">
    <button mat-icon-button (click)="leftOpen.update(v => !v)" matTooltip="Toggle nav">
      <mat-icon>menu</mat-icon>
    </button>
    <span class="app-title">Backlog Browser</span>

    <form class="search-form" (submit)="doSearch($event)">
      <mat-form-field appearance="outline" class="search-field">
        <mat-icon matPrefix>search</mat-icon>
        <input matInput [(ngModel)]="searchQuery" name="q"
               placeholder="Search backlog…" autocomplete="off">
      </mat-form-field>
    </form>

    <span class="spacer"></span>

    <button mat-button [class.active-toggle]="!isSprintBoard()"
            (click)="goToBacklog()"
            matTooltip="Backlog list view">
      <mat-icon>view_list</mat-icon>
      Backlog
    </button>

    <button mat-button [class.active-toggle]="isSprintBoard()"
            (click)="goToSprint()"
            matTooltip="Sprint board view">
      <mat-icon>view_kanban</mat-icon>
      Sprint Board
    </button>

    <button mat-button [class.active-toggle]="filter.showClosed()"
            (click)="toggleClosed()"
            matTooltip="Show or hide closed and removed items">
      <mat-icon>{{ filter.showClosed() ? 'visibility' : 'visibility_off' }}</mat-icon>
      {{ filter.showClosed() ? 'Closed visible' : 'Hide closed' }}
    </button>

    <button mat-icon-button (click)="refresh()" matTooltip="Refresh backlog data">
      <mat-icon>refresh</mat-icon>
    </button>
  </mat-toolbar>

  <!-- Three-panel body -->
  <div class="panels-body" [class.is-resizing]="isResizing()">

    @if (leftOpen()) {
      <div class="panel left-panel" [style.width.px]="leftWidth()">
        <app-epic-nav />
      </div>
      <div class="resize-handle" (mousedown)="startResize($event, 'left')"></div>
    }

    <div class="panel center-panel">
      <router-outlet />
    </div>

    @if (detailOpen()) {
      <div class="resize-handle" (mousedown)="startResize($event, 'right')"></div>
      <div class="panel right-panel" [style.width.px]="rightWidth()">
        <app-item-detail-panel />
      </div>
    }

  </div>

  <!-- Bottom git bar -->
  <div class="git-bar-wrapper">
    <app-git-actions />
  </div>

</div>
